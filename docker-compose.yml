# =============================================================================
# Jobiz - Docker Compose Configuration
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # RxResume dependencies
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: jobiz-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: rxresume
      POSTGRES_USER: rxresume
      POSTGRES_PASSWORD: rxresume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rxresume -d rxresume"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobiz-redis
    restart: unless-stopped
    command: redis-server --requirepass rxresume
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "rxresume", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: jobiz-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: rxresume
      MINIO_ROOT_PASSWORD: rxresume_secret
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  chrome:
    image: ghcr.io/browserless/chromium:latest
    container_name: jobiz-chrome
    restart: unless-stopped
    environment:
      TIMEOUT: 10000
      CONCURRENT: 10
      TOKEN: chrome_token
      EXIT_ON_HEALTH_FAILURE: "true"
      PRE_REQUEST_HEALTH_CHECK: "true"

  minio-init:
    image: minio/mc:latest
    container_name: jobiz-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 rxresume rxresume_secret;
      mc mb --ignore-existing local/default;
      mc anonymous set public local/default;
      exit 0;
      "
    restart: "no"

  rxresume:
    image: amruthpillai/reactive-resume:latest
    container_name: jobiz-rxresume
    restart: unless-stopped
    ports:
      - "3100:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      chrome:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      PUBLIC_URL: http://localhost:3100
      STORAGE_URL: http://minio:9000/default
      CHROME_TOKEN: chrome_token
      CHROME_URL: ws://chrome:3000
      DATABASE_URL: postgresql://rxresume:rxresume@postgres:5432/rxresume
      ACCESS_TOKEN_SECRET: change_me_access_secret_32chars
      REFRESH_TOKEN_SECRET: change_me_refresh_secret_32chars
      REDIS_URL: redis://default:rxresume@redis:6379
      STORAGE_ENDPOINT: minio
      STORAGE_PORT: "9000"
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: default
      STORAGE_ACCESS_KEY: rxresume
      STORAGE_SECRET_KEY: rxresume_secret
      STORAGE_USE_SSL: "false"
      MAIL_FROM: noreply@localhost
      DISABLE_EMAIL_AUTH: "true"

  # ---------------------------------------------------------------------------
  # Jobiz app
  # ---------------------------------------------------------------------------
  job-ops:
    build:
      context: .
      dockerfile: Dockerfile
    image: jobiz:latest
    container_name: job-ops
    ports:
      - "3005:3001"
    depends_on:
      - rxresume
    volumes:
      # Persist database and generated PDFs
      - ./data:/app/data
    environment:
      # Server config
      - NODE_ENV=production
      - PORT=3001

      # Python path (uses system python in container)
      - PYTHON_PATH=/usr/bin/python3

      # Self-hosted RxResume (no credentials needed for local instance)
      - RXRESUME_URL=http://rxresume:3000

    env_file:
      - path: ./.env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    develop:
      watch:
        # Rebuild container when package.json changes
        - path: ./orchestrator/package.json
          action: rebuild
        - path: ./orchestrator/package-lock.json
          action: rebuild
        # Sync source code changes and rebuild inside container
        - path: ./orchestrator/src
          target: /app/orchestrator/src
          action: sync+restart
        - path: ./visa-sponsor-providers
          target: /app/visa-sponsor-providers
          action: sync+restart
        # Sync extractor changes
        - path: ./extractors/gradcracker/src
          target: /app/extractors/gradcracker/src
          action: sync+restart
        - path: ./extractors/hiringcafe/src
          target: /app/extractors/hiringcafe/src
          action: sync+restart
        - path: ./extractors/ukvisajobs/src
          target: /app/extractors/ukvisajobs/src
          action: sync+restart
        - path: ./extractors/jobspy
          target: /app/extractors/jobspy
          action: sync+restart
        - path: ./extractors/koreanboards
          target: /app/extractors/koreanboards
          action: sync+restart

# Volumes for data persistence
volumes:
  postgres_data:
  redis_data:
  minio_data:
